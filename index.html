<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карта проектов</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- python -m http.server 8080 --bind 0.0.0.0 -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <svg width="36" height="36" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="16" fill="none" stroke="#3a7bd5" stroke-width="2"/>
            <circle cx="18" cy="18" r="8" fill="#3a7bd5" opacity="0.6"/>
            <polygon points="18,6 20,14 28,14 22,19 24,27 18,22 12,27 14,19 8,14 16,14" fill="#00d4ff" opacity="0.8"/>
          </svg>
        </div>
        <div class="header-info">
          <h1 id="app-title">Карта проектов</h1>
          <span id="app-subtitle">Интерактивная карта реализованных и текущих проектов</span>
        </div>
      </div>
      <div class="header-right">
        <div class="project-count" id="project-count">
          <span id="count-value">0</span>
          <span id="count-label">проектов</span>
        </div>
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="kk">KZ</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="filter-toggle" id="filter-toggle" title="Фильтры">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>
          </svg>
        </button>
        <button class="fullscreen-btn" id="fullscreen-btn" title="Полноэкранный режим">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="main">
      <aside id="filter-panel" class="filter-panel hidden">
        <div class="filter-header">
          <h2 id="filter-title">Фильтры</h2>
          <button class="filter-clear" id="filter-clear">Сбросить</button>
        </div>
        <div class="filter-body">
          <div class="filter-group">
            <label id="filter-label-region">Регион</label>
            <select id="filter-region">
              <option value="all">Все</option>
            </select>
          </div>
          <div class="filter-group">
            <label id="filter-label-year">Год реализации</label>
            <select id="filter-year">
              <option value="all">Все</option>
            </select>
          </div>
          <div class="filter-group">
            <label id="filter-label-status">Статус</label>
            <select id="filter-status">
              <option value="all">Все</option>
            </select>
          </div>
          <button class="filter-apply" id="filter-apply">Применить</button>
        </div>
      </aside>

      <div id="map-container">
        <div id="map-wrapper">
          <div id="map-svg-container"></div>
        </div>
        <div id="demo-indicator" class="hidden">
          <div class="demo-pulse"></div>
          <span id="demo-label">Демонстрационный режим</span>
        </div>
        <div id="no-results" class="hidden">
          <span id="no-results-text">Проекты не найдены</span>
        </div>
      </div>
    </main>

    <div id="card-overlay" class="hidden"></div>
    <div id="project-card" class="hidden">
      <button class="card-close" id="card-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="card-content">
        <div class="card-gallery" id="card-gallery">
          <div class="card-gallery-placeholder" id="card-gallery-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a6a8a" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-badges">
            <span class="card-badge badge-status" id="card-status"></span>
            <span class="card-badge badge-year" id="card-year"></span>
            <span class="card-badge badge-segment" id="card-segment"></span>
          </div>
          <h2 id="card-title"></h2>
          <div class="card-location" id="card-location">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span id="card-location-text"></span>
          </div>
          <p class="card-description" id="card-description"></p>
          <div class="card-indicators" id="card-indicators">
            <h3 class="card-section-title" id="card-indicators-title">Основные показатели</h3>
            <div class="indicators-grid" id="indicators-grid"></div>
          </div>
          <div class="card-additional" id="card-additional">
            <p id="card-additional-text"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/i18n.js?v=15"></script>
  <script src="js/data-loader.js?v=15"></script>
  <script src="js/svg-viewbox-zoom.js?v=15"></script>
  <script src="js/markers.js?v=15"></script>
  <script src="js/card.js?v=15"></script>
  <script src="js/filter.js?v=15"></script>
  <script src="js/demo.js?v=15"></script>
  <script src="js/editor.js?v=15"></script>
  <script src="js/app.js?v=15"></script>
</body>
</html>
